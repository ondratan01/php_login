<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práce se soubory</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        input, textarea, button {
            margin-bottom: 10px;
        }
        #container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>Práce se soubory</h1>

    <div id="container">
        <!-- Formulář pro vytvoření nového souboru -->
        <div>
            <h3>Vytvořit nový soubor</h3>
            <form method="post" action="process.php">
                <input type="text" name="new_file_name" placeholder="Název nového souboru" required>
                <button type="submit" name="create_new_file">Vytvořit</button>
            </form>
        </div>

        <!-- Formulář pro nahrání souboru -->
        <div>
            <h3>Nahrát nový soubor</h3>
            <form method="post" enctype="multipart/form-data" action="process.php">
                <input type="file" name="file_upload" required>
                <button type="submit" name="upload_file">Nahrát</button>
            </form>
        </div>

        <!-- Výběr souboru pro čtení nebo zápis -->
        <div id="file-selection">
            <h3>Výběr souboru</h3>
            <form method="post" action="process.php">
                <input type="text" name="file_name" placeholder="Název souboru pro čtení/zápis" required>
                <button type="submit" name="open_file">Otevřít soubor</button>
            </form>
        </div>

        <!-- Textové pole pro úpravu obsahu souboru -->
        <div>
            <h3>Upravit obsah souboru</h3>
            <form method="post" action="process.php">
                <textarea name="content" placeholder="Upravte obsah souboru..." required></textarea>
                <input type="hidden" name="file_name" value="">
                <button type="submit" name="save">Uložit změny</button>
            </form>
        </div>
    </div>
</body>
</html>
